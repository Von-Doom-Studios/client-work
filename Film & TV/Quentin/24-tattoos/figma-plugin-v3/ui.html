<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #1A1A1A; color: #F0EAD6; padding: 20px; }
    h2 { font-size: 14px; font-weight: 700; color: #C9A84C; margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase; }
    p { font-size: 11px; color: #9A9080; line-height: 1.5; margin-bottom: 16px; }
    .btn { display: block; width: 100%; padding: 11px 0; background: #C9A84C; color: #0A0A0A; border: none; border-radius: 3px; font-size: 13px; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; text-transform: uppercase; }
    .btn:hover { background: #E8C87A; }
    .tag { font-size: 10px; color: #555; margin-top: 12px; }
  </style>
</head>
<body>
  <h2>24 Tattoos Dossier</h2>
  <p>Generates 16 frames at 1920×1080. Creates a new page — will not overwrite existing work.</p>
  <button class="btn" onclick="parent.postMessage({pluginMessage:{type:'generate'}},'*')">Generate Dossier</button>
  <p class="tag">v3 — bold color fills · unique layout per slide · no bare black backgrounds</p>
</body>
</html>
